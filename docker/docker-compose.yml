services:
  sd-studio:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "6080:6080"        # noVNC (browser): http://localhost:6080/vnc.html
    environment:
      GEOMETRY: 1280x800x24
      STATE_DIR: /app/state
      # Demo/headless auto-unlock. In real use, omit this and type the passphrase via noVNC.
      SD_MASTER_PASSPHRASE: devpass
    volumes:
      - app-state:/app/state
      # DooD: lets the app provision sibling MySQL containers via the host daemon.
      # Security-sensitive (broad host access) — see Fase 3/4 plans; disable in production.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: dev
      MYSQL_DATABASE: sdr_demo
    volumes:
      - mysql-data:/var/lib/mysql   # persistência
    ports:
      - "3307:3306"

volumes:
  app-state:
  mysql-data:
